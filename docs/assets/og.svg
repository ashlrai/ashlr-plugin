<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="630" viewBox="0 0 1200 630">
  <defs>
    <filter id="noise" x="0" y="0" width="100%" height="100%">
      <feTurbulence baseFrequency="0.9" numOctaves="3" stitchTiles="stitch" />
      <feColorMatrix values="0 0 0 0 0.05  0 0 0 0 0.05  0 0 0 0 0.05  0 0 0 0.06 0" />
    </filter>
    <style>
      @import url("https://fonts.googleapis.com/css2?family=Fraunces:opsz,wght@9..144,300;9..144,400&amp;family=JetBrains+Mono:wght@400;500&amp;family=IBM+Plex+Sans:wght@500&amp;display=swap");
    </style>
  </defs>

  <!-- Parchment background -->
  <rect width="1200" height="630" fill="#F3EADB" />

  <!-- Paper grain overlay -->
  <rect width="1200" height="630" filter="url(#noise)" opacity="0.6" />

  <!-- Brand mark -->
  <rect x="80" y="80" width="14" height="14" fill="#8B2E1A" />
  <text x="108" y="96" font-family="Fraunces, serif" font-size="32" fill="#121212" font-weight="400">ashlr</text>

  <!-- Top-right meta -->
  <text x="1120" y="96" font-family="JetBrains Mono, monospace" font-size="14" fill="#121212" opacity="0.55" text-anchor="end" letter-spacing="1.5">v0.1.0 · MIT</text>

  <!-- Eyebrow -->
  <line x1="80" y1="200" x2="140" y2="200" stroke="#8B2E1A" stroke-width="2" />
  <text x="160" y="205" font-family="JetBrains Mono, monospace" font-size="14" fill="#8B2E1A" letter-spacing="3" font-weight="500">THE TOKEN LEDGER</text>

  <!-- Headline -->
  <text x="80" y="310" font-family="Fraunces, serif" font-size="104" fill="#121212" font-weight="300" letter-spacing="-3">Every tool call,</text>
  <text x="80" y="420" font-family="Fraunces, serif" font-style="italic" font-size="104" fill="#8B2E1A" font-weight="300" letter-spacing="-3">line-itemized.</text>

  <!-- Sub -->
  <text x="80" y="490" font-family="IBM Plex Sans, sans-serif" font-size="24" fill="#121212" opacity="0.8" font-weight="400">Open-source Claude Code plugin — token-efficient Read, Grep, Edit.</text>
  <text x="80" y="524" font-family="IBM Plex Sans, sans-serif" font-size="24" fill="#121212" opacity="0.55">Mean −79.5% savings across files ≥ 2 KB.</text>

  <!-- Bottom strip: install commands -->
  <line x1="80" y1="570" x2="1120" y2="570" stroke="#121212" stroke-opacity="0.15" stroke-width="1" />
  <text x="80" y="600" font-family="JetBrains Mono, monospace" font-size="16" fill="#121212">/plugin marketplace add ashlrai/ashlr-plugin</text>
  <text x="1120" y="600" font-family="JetBrains Mono, monospace" font-size="14" fill="#8B2E1A" text-anchor="end" letter-spacing="1.5">plugin.ashlr.ai</text>
</svg>
