name: Render hero video

on:
  push:
    paths:
      - "video/**"
      - "servers/_status-line-cells.ts"
  workflow_dispatch:

jobs:
  render:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v4

      - uses: oven-sh/setup-bun@v1
        with:
          bun-version: latest

      - name: Install video deps
        working-directory: video
        run: bun install

      - name: Install ffmpeg + Chromium deps
        run: |
          sudo apt-get update
          sudo apt-get install -y ffmpeg libnss3 libgbm1 libasound2t64

      - name: Render hero.mp4 + poster + og + vertical
        working-directory: video
        run: bun run render

      - name: Upload rendered artefacts
        uses: actions/upload-artifact@v4
        with:
          name: hero-assets
          path: |
            video/out/hero.mp4
            video/out/hero-poster.jpg
            video/out/og.jpg
            video/out/hero-vertical.mp4
          retention-days: 30

      # The rendered hero lives in site/public/ so the Next.js deploy picks it
      # up. We commit changes to a branch and open a PR rather than pushing
      # direct to main — keeps the binary churn auditable.
      - name: Stage artefacts for site/public
        run: |
          cp video/out/hero.mp4         site/public/hero.mp4
          cp video/out/hero-poster.jpg  site/public/hero-poster.jpg
          cp video/out/og.jpg           docs/assets/og.png || true

      - name: Open PR with refreshed assets
        uses: peter-evans/create-pull-request@v6
        with:
          branch: auto/hero-assets
          commit-message: "chore: refresh hero video + poster + og"
          title: "chore: refresh hero video + poster + og"
          body: |
            Auto-generated by `.github/workflows/render-hero.yml` after a
            change landed in `video/` or `servers/_status-line-cells.ts`.

            Artefacts:
            - `site/public/hero.mp4` (1080p60 H.264)
            - `site/public/hero-poster.jpg` (frame 60)
            - `docs/assets/og.png` (frame 1680 — tagline card)

            Review, squash-merge, and the Vercel deploy picks up the new
            assets automatically.
          add-paths: |
            site/public/hero.mp4
            site/public/hero-poster.jpg
            docs/assets/og.png
