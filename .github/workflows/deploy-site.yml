name: Deploy site to Vercel

on:
  push:
    branches: [main]
    paths: ["site/**"]
  pull_request:
    branches: [main]
    paths: ["site/**"]

concurrency:
  group: deploy-site-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    name: Build + Deploy (Vercel)

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Setup Node (for vercel CLI)
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Install dependencies
        working-directory: site
        run: bun install --frozen-lockfile

      - name: Build
        working-directory: site
        run: bun run build

      # Production deploy — push to main + secret present.
      # Repos using Vercel's GitHub App can leave secrets unset; this workflow
      # then becomes a build-only check.
      - name: Deploy to Vercel (production)
        if: github.event_name == 'push' && github.ref == 'refs/heads/main' && env.VERCEL_TOKEN != ''
        working-directory: site
        env:
          VERCEL_TOKEN: ${{ secrets.VERCEL_TOKEN }}
          VERCEL_ORG_ID: ${{ secrets.VERCEL_ORG_ID }}
          VERCEL_PROJECT_ID: ${{ secrets.VERCEL_PROJECT_ID }}
        run: |
          npx vercel@latest pull --yes --environment=production --token="$VERCEL_TOKEN"
          npx vercel@latest build --prod --token="$VERCEL_TOKEN"
          npx vercel@latest deploy --prebuilt --prod --token="$VERCEL_TOKEN"

      # Preview deploy — PRs + secret present.
      - name: Deploy to Vercel (preview)
        if: github.event_name == 'pull_request' && env.VERCEL_TOKEN != ''
        working-directory: site
        env:
          VERCEL_TOKEN: ${{ secrets.VERCEL_TOKEN }}
          VERCEL_ORG_ID: ${{ secrets.VERCEL_ORG_ID }}
          VERCEL_PROJECT_ID: ${{ secrets.VERCEL_PROJECT_ID }}
        run: |
          npx vercel@latest pull --yes --environment=preview --token="$VERCEL_TOKEN"
          npx vercel@latest build --token="$VERCEL_TOKEN"
          npx vercel@latest deploy --prebuilt --token="$VERCEL_TOKEN"
