name: Deploy server to Railway

on:
  push:
    branches: [main]
    paths:
      - "server/**"
      - ".github/workflows/deploy-server.yml"

concurrency:
  group: deploy-server-${{ github.ref }}
  cancel-in-progress: true

jobs:
  test-and-deploy:
    runs-on: ubuntu-latest
    name: Test + Deploy (Railway)

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Install dependencies
        working-directory: server
        run: bun install

      - name: Run tests
        working-directory: server
        run: bun test

      - name: Install Railway CLI
        run: |
          curl -fsSL https://railway.com/install.sh | sh
          echo "$HOME/.railway/bin" >> "$GITHUB_PATH"

      - name: Deploy to Railway
        working-directory: server
        # RAILWAY_PROJECT_ID is required because there's no `.railway` link
        # state in a fresh CI checkout — the CLI can't infer which project
        # the project-scoped RAILWAY_TOKEN belongs to without it.
        # The project + service IDs are non-sensitive (just UUIDs).
        run: railway up --service ashlr-plugin-api --detach
        env:
          RAILWAY_TOKEN:       ${{ secrets.RAILWAY_TOKEN }}
          RAILWAY_PROJECT_ID:  cc997995-c95d-4f1b-9d43-86cd41aa1d66
          RAILWAY_SERVICE_ID:  82d8e992-81d5-4a30-88bf-8e90fbd3f044
          RAILWAY_ENVIRONMENT: production
