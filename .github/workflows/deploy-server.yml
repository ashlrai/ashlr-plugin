name: Deploy server to Railway

on:
  push:
    branches: [main]
    paths:
      - "server/**"
      - ".github/workflows/deploy-server.yml"

concurrency:
  group: deploy-server-${{ github.ref }}
  cancel-in-progress: true

jobs:
  test-and-deploy:
    runs-on: ubuntu-latest
    name: Test + Deploy (Railway)

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Install dependencies
        working-directory: server
        run: bun install

      - name: Run tests
        working-directory: server
        run: bun test

      - name: Install Railway CLI
        # NOT `npm install -g @railway/cli` — that's the legacy Node.js CLI
        # which doesn't honor RAILWAY_PROJECT_ID/SERVICE_ID/ENVIRONMENT and
        # rejects project-scoped tokens. We need the new Rust CLI.
        #
        # NOT `curl https://railway.com/install.sh | sh` — that script hits
        # the GitHub releases API to discover "latest", which is shared and
        # rate-limited on CI.
        #
        # Direct binary download from a pinned release works around both.
        run: |
          # v4.27.5 verified working locally with the same env vars + token.
          # v4.44.0 (the latest as of 2026-05) rejects the same token in CI
          # with "Invalid RAILWAY_TOKEN" — likely an auth-flow regression.
          # Bump cautiously after verifying the new version still accepts
          # project-scoped tokens with PROJECT_ID env vars.
          curl -fsSL "https://github.com/railwayapp/cli/releases/download/v4.27.5/railway-v4.27.5-x86_64-unknown-linux-gnu.tar.gz" \
            | tar xz -C /usr/local/bin railway
          railway --version

      - name: Deploy to Railway
        working-directory: server
        # RAILWAY_PROJECT_ID is required because there's no `.railway` link
        # state in a fresh CI checkout — the CLI can't infer which project
        # the project-scoped RAILWAY_TOKEN belongs to without it.
        # The project + service IDs are non-sensitive (just UUIDs).
        run: railway up --service ashlr-plugin-api --detach
        env:
          RAILWAY_TOKEN:       ${{ secrets.RAILWAY_TOKEN }}
          RAILWAY_PROJECT_ID:  cc997995-c95d-4f1b-9d43-86cd41aa1d66
          RAILWAY_SERVICE_ID:  82d8e992-81d5-4a30-88bf-8e90fbd3f044
          RAILWAY_ENVIRONMENT: production
