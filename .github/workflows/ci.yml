name: ci

on:
  push:
    branches: [main]
  pull_request:
  schedule:
    - cron: "0 0 * * 1"  # every Monday UTC

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

# ---------------------------------------------------------------------------
# ripgrep install helper — reused by typecheck, test, smoke, benchmark-check.
# ---------------------------------------------------------------------------
#
# Matrix: ubuntu-latest, macos-latest, windows-latest
# fail-fast: false so one OS failure does not cancel the others.
# ---------------------------------------------------------------------------

jobs:
  typecheck:
    name: typecheck (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
    steps:
      - uses: actions/checkout@v4
        with:
          # Disable CRLF auto-conversion so line endings stay LF on Windows.
          lfs: false
      - name: Disable CRLF auto-conversion (Windows)
        if: runner.os == 'Windows'
        shell: bash
        run: git config --global core.autocrlf false
      - uses: oven-sh/setup-bun@v1
        with:
          bun-version: latest
      - name: Cache node_modules
        uses: actions/cache@v4
        with:
          path: node_modules
          # Include OS in cache key so Windows/mac/linux don't share native modules.
          key: bun-${{ runner.os }}-${{ hashFiles('bun.lock') }}
      - run: bun install
      - run: bun run typecheck

  test:
    name: test (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
    env:
      ASHLR_STATS_SYNC: "1"
    steps:
      - uses: actions/checkout@v4
      - name: Disable CRLF auto-conversion (Windows)
        if: runner.os == 'Windows'
        shell: bash
        run: git config --global core.autocrlf false
      - uses: oven-sh/setup-bun@v1
        with:
          bun-version: latest
      - name: Cache node_modules
        uses: actions/cache@v4
        with:
          path: node_modules
          key: bun-${{ runner.os }}-${{ hashFiles('bun.lock') }}
      # --- ripgrep install (platform-specific) ---
      - name: Install ripgrep (Linux)
        if: runner.os == 'Linux'
        run: sudo apt-get install -y ripgrep
      - name: Install ripgrep (macOS)
        if: runner.os == 'macOS'
        run: brew install ripgrep
      - name: Install ripgrep (Windows)
        if: runner.os == 'Windows'
        shell: pwsh
        # Chocolatey is always preinstalled on windows-latest and doesn't
        # need the msstore source agreement that breaks `winget install` in
        # CI (see https://github.com/microsoft/winget-cli/issues/4403).
        run: choco install ripgrep -y --no-progress
      - run: bun install
      - run: bun run test

  smoke:
    name: smoke (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
    steps:
      - uses: actions/checkout@v4
      - name: Disable CRLF auto-conversion (Windows)
        if: runner.os == 'Windows'
        shell: bash
        run: git config --global core.autocrlf false
      - uses: oven-sh/setup-bun@v1
        with:
          bun-version: latest
      - name: Cache node_modules
        uses: actions/cache@v4
        with:
          path: node_modules
          key: bun-${{ runner.os }}-${{ hashFiles('bun.lock') }}
      - run: bun install
      - name: Run real-time counters smoke test
        # smoke-realtime.ts uses process.env.HOME; on Windows HOME is unset by
        # default — Bun sets it from USERPROFILE, which is fine.
        run: bun run scripts/smoke-realtime.ts
        timeout-minutes: 2
      - name: Run cross-platform smoke test
        run: bun run scripts/smoke-cross-platform.ts
        timeout-minutes: 2

  # ---------------------------------------------------------------------------
  # benchmark-check: on every push, verify the script still exits 0 (dry-run).
  # Linux-only — benchmark logic is not platform-sensitive.
  # ---------------------------------------------------------------------------
  benchmark-check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: oven-sh/setup-bun@v1
        with:
          bun-version: latest
      - name: Cache node_modules
        uses: actions/cache@v4
        with:
          path: node_modules
          key: bun-${{ runner.os }}-${{ hashFiles('bun.lock') }}
      - name: Install ripgrep
        run: sudo apt-get install -y ripgrep
      - run: bun install
      - name: Benchmark dry-run
        run: bun run scripts/run-benchmark.ts --repo . --dry-run

  # ---------------------------------------------------------------------------
  # benchmark: weekly full run, commits updated JSON, opens a PR for review.
  # Runs every Monday at 00:00 UTC.
  # ---------------------------------------------------------------------------
  benchmark:
    if: github.event_name == 'schedule'
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pull-requests: write
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - uses: oven-sh/setup-bun@v1
        with:
          bun-version: latest
      - name: Cache node_modules
        uses: actions/cache@v4
        with:
          path: node_modules
          key: bun-${{ runner.os }}-${{ hashFiles('bun.lock') }}
      - name: Install ripgrep
        run: sudo apt-get install -y ripgrep
      - run: bun install
      - name: Run benchmark
        run: bun run scripts/run-benchmark.ts --repo . --out docs/benchmarks-v2.json
      - name: Open PR with updated benchmark data
        uses: peter-evans/create-pull-request@v6
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          commit-message: "chore: weekly benchmark refresh"
          branch: chore/weekly-benchmark-refresh
          title: "chore: weekly benchmark refresh"
          body: |
            Automated weekly benchmark run.

            Re-run locally with:
            ```
            bun run scripts/run-benchmark.ts --repo .
            ```

            Review the aggregate numbers in `docs/benchmarks-v2.json` before merging.
          add-paths: docs/benchmarks-v2.json

  # ---------------------------------------------------------------------------
  # integration: end-to-end tests — Linux only.
  #
  # These tests spawn the backend server process and exercise the full request
  # path. The server is deployed on Linux in production; running e2e tests
  # there is sufficient platform parity. macOS/Windows integration coverage
  # is provided by the unit test matrix above.
  # ---------------------------------------------------------------------------
  integration:
    needs: test
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4
      - uses: oven-sh/setup-bun@v1
        with:
          bun-version: latest
      - name: Cache root node_modules
        uses: actions/cache@v4
        with:
          path: node_modules
          key: bun-${{ runner.os }}-${{ hashFiles('bun.lock') }}
      - name: Cache server node_modules
        uses: actions/cache@v4
        with:
          path: server/node_modules
          key: bun-server-${{ runner.os }}-${{ hashFiles('server/bun.lock') }}
      - name: Cache integration node_modules
        uses: actions/cache@v4
        with:
          path: integration/node_modules
          key: bun-integration-${{ runner.os }}-${{ hashFiles('integration/package.json') }}
      - name: Install ripgrep
        run: sudo apt-get install -y ripgrep
      - name: Install root deps
        run: bun install
      - name: Install server deps
        run: cd server && bun install
      - name: Install integration deps
        run: cd integration && bun install
      - name: Run integration tests
        run: cd integration && bun test --timeout 30000
        env:
          TESTING: "1"
          ASHLR_DISABLE_CLOUD_LLM: "1"
